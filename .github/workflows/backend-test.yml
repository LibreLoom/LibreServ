name: Backend Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/backend/go.mod
          cache: true

      - name: Go test
        env:
          GOCACHE: ${{ github.workspace }}/.cache/gocache
          GOMODCACHE: ${{ github.workspace }}/.cache/gomodcache
          GOPATH: ${{ github.workspace }}/.cache/gopath
        run: go test ./...
