server:
  host: "0.0.0.0"
  port: 8080
  mode: development

database:
  path: "./dev/data/libreserv.db"

apps:
  data_path: "./dev/data/apps"
  catalog_path: "./apps"

docker:
  method: auto
  socket_path: "/var/run/docker.sock"
  timeout: "30s"

logging:
  level: debug
  path: "./dev/logs"

network:
  caddy:
    mode: "enabled" # enabled|noop|disabled
    admin_api: ""
    config_path: "./dev/caddy/Caddyfile"
    certs_path: "./dev/caddy/certs"
    default_domain: "localhost"
    email: ""
    auto_https: false
    reload:
      retries: 5
      backoff_min: "200ms"
      backoff_max: "5s"
      jitter_fraction: 0.2
      attempt_timeout: "5s"
    logging:
      output: "stdout" # stdout|stderr|file
      file: ""         # used when output == file
      format: "console" # console|json
      level: ""        # optional (e.g. INFO)
  acme:
    external:
      enabled: false
      use_docker: true
      docker_image: "goacme/lego:latest"
      data_path: "./dev/acme"
      dns_provider: "" # e.g. cloudflare, route53, gandi, ...
      dns_env: {}      # provider-specific env vars (secrets!)
      email: ""        # defaults to network.caddy.email if empty
      staging: false
      ca_dir_url: ""   # optional override of ACME directory URL
      key_type: "rsa2048"
      certs_path: "./dev/caddy/certs"

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""
  use_tls: true
  skip_verify: false

notify:
  enabled: false
  support_recipients: []
  support_subject: "LibreServ support session created"
  support_body: |
    A support session was created.

    Code: {{.Code}}
    Token: {{.Token}}
    Expires: {{.Expires}}
    Scopes: {{.Scopes}}
    Created By: {{.CreatedBy}}
  welcome_subject: "Welcome to LibreServ"
  welcome_body: |
    Your LibreServ admin account is ready.
