# NOTE: Nextcloud AIO requires root to manage sub-containers internally.
# The AIO mastercontainer spawns additional containers (nginx, redis, etc.)
# that handle their own user mapping. Do NOT add user: directive here.
services:
  nextcloud-aio-mastercontainer:
    image: nextcloud/all-in-one:latest
    container_name: "{{.instance_id}}-nextcloud-aio-master"
    restart: unless-stopped
    ports:
      - "{{.http_port}}:80"
      - "{{.https_port}}:443"
      - "{{.aio_port}}:8080"
    environment:
      - NEXTCLOUD_DATADIR={{.data_dir}}
    volumes:
      - "{{ dataPath }}/aio-config:/mnt/docker-aio-config"
      - "{{ dataPath }}/ncdata:/mnt/ncdata"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    stop_grace_period: 1m
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    labels:
      - "libreserv.app={{.instance_id}}"
      - "libreserv.app.name={{.app_name}}"
    networks:
      - nextcloud-aio

networks:
  nextcloud-aio:
    driver: bridge
