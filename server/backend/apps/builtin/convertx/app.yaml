id: convertx
name: ConvertX
description: Self-hosted file converter supporting 800+ formats including documents, images, audio, video, and archives
version: "0.5.2"
category: utility
website: https://github.com/C4illin/ConvertX
repository: https://github.com/C4illin/ConvertX
featured: false

deployment:
  compose_file: app-compose/docker-compose.yml
  ports:
    - host: 3000
      container: 3000
      protocol: tcp
  volumes:
    - name: convertx
      mount_path: /app/data
  restart_policy: unless-stopped

configuration:
  - name: http_port
    label: HTTP Port
    description: Port to access ConvertX web interface
    type: port
    default: 3000
    required: true
    env_var: HTTP_PORT
  - name: http_allowed
    label: Allow HTTP Connections
    description: Set to true to allow HTTP connections (required for local access without HTTPS)
    type: boolean
    default: true
    required: true
    env_var: HTTP_ALLOWED
  - name: account_registration
    label: Allow Account Registration
    description: Set to false to disable account registration (public access mode)
    type: boolean
    default: false
    required: true
    env_var: ACCOUNT_REGISTRATION
  - name: allow_unauthenticated
    label: Allow Unauthenticated Access
    description: Set to true to allow users to use the service without logging in (history in localStorage)
    type: boolean
    default: true
    required: true
    env_var: ALLOW_UNAUTHENTICATED

health_check:
  type: http
  endpoint: /
  port: 3000
  interval: 30s
  timeout: 10s
  retries: 3

requirements:
  min_ram: "512M"
  min_cpu: 0.5
  min_disk: "2G"
  arch:
    - amd64
    - arm64

updates:
  strategy: notify
  backup_before_update: true
  allow_downgrade: false

features:
  access_model: public

scripts:
  system:
    setup: scripts/system-setup
    update: scripts/system-update
    repair: scripts/system-repair
    backup: scripts/system-backup
    restore: scripts/system-restore

