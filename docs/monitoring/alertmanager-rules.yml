groups:
  - name: libreserv-caddy-alerts
    rules:
      # Reload failures
      - alert: CaddyReloadFailureRateHigh
        expr: |
          (
            sum(rate(caddy_reload_attempts_total{status="failure"}[5m]))
            /
            sum(rate(caddy_reload_attempts_total[5m]))
          ) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Caddy reload failure rate"
          description: "Caddy reload failure rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: CaddyReloadDurationHigh
        expr: histogram_quantile(0.95, rate(caddy_reload_duration_seconds_bucket[5m])) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Caddy reload duration is high"
          description: "95th percentile of Caddy reload duration is {{ $value }}s"

      # Certificate issues
      - alert: CertificateIssuanceFailureRateHigh
        expr: |
          (
            sum(rate(caddy_cert_issuance_attempts_total{status="failure"}[1h]))
            /
            sum(rate(caddy_cert_issuance_attempts_total[1h]))
          ) > 0.2
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "High certificate issuance failure rate"
          description: "Certificate issuance failure rate is {{ $value | humanizePercentage }} over the last hour"

      - alert: CertificateExpiringSoon
        expr: (caddy_cert_expiry_timestamp - time()) / 86400 < 7
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Certificate expiring soon"
          description: "Certificate for {{ $labels.domain }} expires in {{ $value | humanizeDuration }}"

      - alert: CertificateExpired
        expr: caddy_cert_expiry_timestamp < time()
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Certificate has expired"
          description: "Certificate for {{ $labels.domain }} has expired"

      # Admin API issues
      - alert: CaddyAdminAPIErrorRateHigh
        expr: |
          (
            sum(rate(caddy_admin_api_requests_total{status="failure"}[5m]))
            /
            sum(rate(caddy_admin_api_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Caddy Admin API error rate"
          description: "Admin API error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: CaddyAdminAPILatencyHigh
        expr: histogram_quantile(0.95, rate(caddy_admin_api_duration_seconds_bucket[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Caddy Admin API latency is high"
          description: "95th percentile of Admin API response time is {{ $value }}s"
