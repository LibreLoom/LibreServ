name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version-file: server/backend/go.mod

      - name: Build backend binary
        working-directory: server/backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${{ github.ref_name }}
          make build

      - name: Build frontend
        working-directory: server/frontend
        run: |
          npm ci
          npm run build

      - name: Package release
        run: |
          mkdir -p dist/libreserv-${{ matrix.goos }}-${{ matrix.goarch }}
          cp server/backend/bin/libreserv dist/libreserv-${{ matrix.goos }}-${{ matrix.goarch }}/
          cp -r server/frontend/dist dist/libreserv-${{ matrix.goos }}-${{ matrix.goarch }}/
          cp -r server/backend/configs dist/libreserv-${{ matrix.goos }}-${{ matrix.goarch }}/
          cp README.md LICENSE dist/libreserv-${{ matrix.goos }}-${{ matrix.goarch }}/
          
          cd dist
          if [ "${{ matrix.goos }}" == "windows" ]; then
            zip -r libreserv-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip libreserv-${{ matrix.goos }}-${{ matrix.goarch }}
          else
            tar -czf libreserv-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz libreserv-${{ matrix.goos }}-${{ matrix.goarch }}
          fi

      - name: Upload artifacts
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/libreserv-*

  create-release:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Download all artifacts
        uses: https://github.com/actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate changelog
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release on Gitea
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_URL: ${{ gitea.server_url }}
          REPO_OWNER: ${{ gitea.repository_owner }}
          REPO_NAME: ${{ gitea.repository_name }}
          TAG: ${{ github.ref_name }}
        run: |
          # Determine if prerelease
          IS_PRERELEASE="false"
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]]; then
            IS_PRERELEASE="true"
          fi
          
          # Create release using Gitea API
          RELEASE_DATA=$(cat <<EOF
          {
            "tag_name": "$TAG",
            "name": "Release $TAG",
            "body": "## Changes\n${{ steps.changelog.outputs.changelog }}\n\n## Docker Images\n- \`gt.plainskill.net/libreloom/libreserv:$TAG\`\n- \`gt.plainskill.net/libreloom/libreserv:latest\`\n\n## Installation\nDownload the appropriate binary for your platform and extract it.",
            "draft": false,
            "prerelease": $IS_PRERELEASE
          }
          EOF
          )
          
          curl -X POST \
            -H "Authorization: token $GITEA_TOKEN" \
            -H "Content-Type: application/json" \
            "$GITEA_URL/api/v1/repos/$REPO_OWNER/$REPO_NAME/releases" \
            -d "$RELEASE_DATA"
      
      - name: Upload Release Assets
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          GITEA_URL: ${{ gitea.server_url }}
          REPO_OWNER: ${{ gitea.repository_owner }}
          REPO_NAME: ${{ gitea.repository_name }}
          TAG: ${{ github.ref_name }}
        run: |
          # Find release ID
          RELEASE_ID=$(curl -s \
            -H "Authorization: token $GITEA_TOKEN" \
            "$GITEA_URL/api/v1/repos/$REPO_OWNER/$REPO_NAME/releases" | \
            jq -r ".[] | select(.tag_name==\"$TAG\") | .id")
          
          # Upload each artifact
          for file in ./artifacts/**/*.tar.gz ./artifacts/**/*.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file..."
              curl -X POST \
                -H "Authorization: token $GITEA_TOKEN" \
                -F "attachment=@$file" \
                "$GITEA_URL/api/v1/repos/$REPO_OWNER/$REPO_NAME/releases/$RELEASE_ID/assets"
            fi
          done
