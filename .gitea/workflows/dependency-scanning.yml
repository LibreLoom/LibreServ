name: Security Scanning

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan on Sunday

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server/backend
    steps:
      - name: Checkout code
        uses: https://github.com/actions/checkout@v4

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version-file: server/backend/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...

  gosec:
    name: Gosec Security Scanner (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - server/backend
          - support/support-relay
          - support/support-server
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout code
        uses: https://github.com/actions/checkout@v4

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec Security Scanner
        run: |
          $(go env GOPATH)/bin/gosec -no-fail -fmt sarif -out results.sarif -stdout -verbose text ./...
        continue-on-error: true

      - name: Upload SARIF results
        uses: https://github.com/actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-results-${{ matrix.module }}
          path: results.sarif

  staticcheck:
    name: Static Analysis (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - server/backend
          - support/support-relay
          - support/support-server
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout code
        uses: https://github.com/actions/checkout@v4

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2025.1

      - name: Run Staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...
