name: Code Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/backend
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version-file: server/backend/go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: |
          go tool cover -html=coverage.out -o coverage.html
          go tool cover -func=coverage.out > coverage.txt

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "::warning::Coverage is below 60% (${COVERAGE}%)"
          fi
          echo "coverage=${COVERAGE}" >> $GITHUB_ENV

      - name: Upload coverage report
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            server/backend/coverage.html
            server/backend/coverage.txt
            server/backend/coverage.out

      - name: Coverage summary
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total Coverage: **${{ env.coverage }}%**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage by Package" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep -E "^github" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  coverage-badge:
    runs-on: ubuntu-latest
    needs: coverage
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Download coverage report
        uses: https://github.com/actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./coverage

      - name: Generate coverage badge
        run: |
          COVERAGE=$(cat ./coverage/coverage.txt | grep total | awk '{print $3}' | sed 's/%//')
          COLOR="red"
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="yellow"
          fi
          
          # Create badge JSON
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"${COVERAGE}%\", \"color\": \"${COLOR}\"}" > coverage-badge.json
          
      - name: Upload badge
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage-badge.json
