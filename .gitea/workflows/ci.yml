name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - server/backend
          - support/support-relay
          - support/support-server
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: |
            ${{ matrix.module }}/go.mod
            ${{ matrix.module }}/go.sum

      - name: Format check
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "Files need gofmt:" && echo "$fmt_out" && exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        env:
          GOCACHE: ${{ gitea.workspace }}/.cache/gocache
          GOMODCACHE: ${{ gitea.workspace }}/.cache/gomodcache
          GOPATH: ${{ gitea.workspace }}/.cache/gopath
        run: go test ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/frontend
    env:
      CI: true
      npm_config_unsafe_perm: "true"
      NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up Node
        uses: https://github.com/actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --no-fund

      - name: Lint
        run: npm run lint

      - name: Scan hardcoded colors
        run: npm run scan:colors

      - name: Build
        run: npm run build
