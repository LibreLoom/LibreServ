version: '3.8'

services:
  libreserv:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    container_name: libreserv
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Docker socket - required for container management
      # SECURITY: Mounted read-only to prevent container escape
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/app/data
      - ./configs:/app/configs
      - ./caddy:/etc/caddy
    environment:
      - LIBRESERV_DOCKER_METHOD=socket
      - LIBRESERV_DOCKER_SOCKET_PATH=/var/run/docker.sock
      - LIBRESERV_NETWORK_CADDY_MODE=enabled
      - LIBRESERV_NETWORK_CADDY_ADMIN_API=http://caddy:2019
      - LIBRESERV_NETWORK_CADDY_CONFIG_PATH=/etc/caddy/Caddyfile
    depends_on:
      caddy:
        condition: service_healthy
    # Resource limits for stability and security
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    # Health check to ensure service is running properly
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Security options
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem for security
    read_only: true
    # Temporary filesystem for writable areas
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  caddy:
    image: caddy:2.7-alpine
    container_name: libreserv-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Health check for Caddy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Security options
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem
    read_only: true
    # Temporary filesystem
    tmpfs:
      - /tmp:noexec,nosuid,size=50m

volumes:
  caddy_data:
  caddy_config:
