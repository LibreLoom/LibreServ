server:
  host: "0.0.0.0"
  port: 8080
  mode: development

database:
  path: "./dev/data/libreserv.db"

apps:
  data_path: "./dev/data/apps"
  catalog_path: "./apps"

docker:
  method: auto
  socket_path: "/var/run/docker.sock"
  timeout: "30s"

logging:
  level: debug
  path: "./dev/logs"

network:
  caddy:
    admin_api: ""
    config_path: "./dev/caddy/Caddyfile"
    default_domain: "localhost"
    email: ""
    auto_https: false

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""
  use_tls: true
  skip_verify: false

notify:
  enabled: false
  support_recipients: []
  support_subject: "LibreServ support session created"
  support_body: |
    A support session was created.

    Code: {{.Code}}
    Token: {{.Token}}
    Expires: {{.Expires}}
    Scopes: {{.Scopes}}
    Created By: {{.CreatedBy}}
  welcome_subject: "Welcome to LibreServ"
  welcome_body: |
    Your LibreServ admin account is ready.
