server:
  host: "0.0.0.0"
  port: 8080
  mode: development

database:
  path: "./dev/data/libreserv.db"

apps:
  data_path: "./dev/data/apps"
  catalog_path: "./apps"

docker:
  method: auto
  socket_path: "/var/run/docker.sock"
  timeout: "30s"

logging:
  level: debug
  path: "./dev/logs"

network:
  caddy:
    admin_api: ""
    config_path: "./dev/caddy/Caddyfile"
    default_domain: "localhost"
    email: ""
    auto_https: false
